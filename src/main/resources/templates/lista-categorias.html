<!DOCTYPE html>
<html lang="pt-br"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Categorias</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<nav class="navbar mb-0">
    <div class="container" style="padding-top:0;padding-bottom:0;">
        <div class="d-flex align-items-center">
            <a class="navbar-brand" href="/dashboard">Catalogo</a>
            <div class="nav-links d-flex">
                <a href="/dashboard" class="nav-link-custom">Dashboard</a>
                <a href="/produtos" class="nav-link-custom">Produtos</a>
                <a href="/categorias" class="nav-link-custom" sec:authorize="isAuthenticated()">Categorias</a>
                <a href="/usuarios" class="nav-link-custom" sec:authorize="hasRole('ADMIN')">Usu&aacute;rios</a>
            </div>
        </div>

        <div sec:authorize="isAuthenticated()" class="d-flex align-items-center gap-3">
            <span class="user-welcome">
                Bem-vindo, <strong sec:authentication="name"></strong>
            </span>
            <form th:action="@{/logout}" method="post" class="d-inline">
                <button type="submit" class="btn btn-outline-secondary btn-sm">Sair</button>
            </form>
        </div>
    </div>
</nav>

<div class="container">
    <div th:if="${erro}" class="alert-erro mb-3">
        <span th:text="${erro}"></span>
    </div>

    <div class="card">
        <div class="card-header d-flex justify-content-between align-items-center">
            <h2 class="mb-0">Categorias</h2>
            <div class="d-flex gap-2 align-items-center">
                <form th:action="@{/categorias}" method="get" class="d-flex gap-2">
                    <input type="text" name="nome" th:value="${termoBusca}"
                           class="form-control form-control-sm" placeholder="Buscar por nome..." style="width: 220px;">
                    <button type="submit" class="btn btn-primary btn-sm">Buscar</button>
                    <a th:if="${termoBusca != null and !termoBusca.isEmpty()}" href="/categorias"
                       class="btn btn-secondary btn-sm">Limpar</a>
                </form>

                <a href="/categorias/novo" class="btn btn-success btn-sm" sec:authorize="hasRole('ADMIN')">+ Nova</a>
            </div>
        </div>

        <div class="card-body" style="padding: 0;">
            <div class="table-responsive">
                <table class="table align-middle">
                    <thead>
                    <tr>
                        <th style="padding-left:28px;">Nome</th>
                        <th sec:authorize="hasRole('ADMIN')">A&ccedil;&otilde;es</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:if="${#lists.isEmpty(categorias)}">
                        <td th:attr="colspan=${#authorization.expression('hasRole(''ADMIN'')') ? 2 : 1}" style="border:none;">
                            <div class="empty-state">
                            <p>Nenhuma categoria cadastrada ainda.</p>
                            </div>
                        </td>
                    </tr>
                    <tr th:each="c : ${categorias}">
                        <td style="padding-left:28px;" data-label="Nome">
                            <span class="product-name" th:text="${c.nome}"></span>
                        </td>
                        <td data-label="A&ccedil;&otilde;es" sec:authorize="hasRole('ADMIN')">
                            <div class="action-group">
                                <a th:href="@{/categorias/editar/{id}(id=${c.idCategoria})}" class="btn btn-success btn-sm">Editar</a>
                                <button type="button" class="btn btn-danger btn-sm" data-bs-toggle="modal"
                                        data-bs-target="#modalExcluir"
                                        th:attr="data-id=${c.idCategoria}, data-nome=${c.nome}">
                                    Excluir
                                </button>
                            </div>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="modalExcluir" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
            <h5 class="modal-title">Excluir categoria</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                Voc&ecirc; est&aacute; prestes a excluir <strong id="nomeCategoria"></strong>. Essa a&ccedil;&atilde;o n&atilde;o pode ser desfeita.
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                <a id="btnConfirmarExclusao" href="#" class="btn btn-danger">Confirmar exclus&atilde;o</a>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    document.getElementById('modalExcluir').addEventListener('show.bs.modal', function(e) {
        const btn = e.relatedTarget;
        document.getElementById('nomeCategoria').textContent = btn.getAttribute('data-nome');
        document.getElementById('btnConfirmarExclusao').href = '/categorias/excluir/' + btn.getAttribute('data-id');
    });
</script>
</body>
</html>
