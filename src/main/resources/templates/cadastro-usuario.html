<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Novo Usuário</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<nav class="navbar mb-0">
    <div class="container" style="padding-top:0;padding-bottom:0;">
        <a class="navbar-brand" href="/produtos">Catálogo</a>
    </div>
</nav>

<div class="container">
    <div class="card mx-auto" style="max-width:480px;">
        <div class="card-header">
            <h2>Novo Usuário</h2>
        </div>
        <div class="card-body">
            <form th:action="@{/usuarios/novo}" th:object="${usuario}" method="post" novalidate>
                <div class="mb-3">
                    <label for="username" class="form-label">Nome de usuário</label>
                    <input type="text"
                           th:field="*{username}"
                           th:classappend="${#fields.hasErrors('username')} ? 'is-invalid' : ''"
                           class="form-control"
                           id="username"
                           placeholder="Ex: joao.silva">
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></div>
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label">Senha</label>
                    <input type="password"
                           th:field="*{password}"
                           th:classappend="${#fields.hasErrors('password')} ? 'is-invalid' : ''"
                           class="form-control"
                           id="password"
                           placeholder="Mínimo 5 caracteres">
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
                </div>
                <div class="mb-4">
                    <label for="role" class="form-label">Perfil</label>
                    <select th:field="*{role}"
                            th:classappend="${#fields.hasErrors('role')} ? 'is-invalid' : ''"
                            class="form-select"
                            id="role">
                        <option value="">Selecione...</option>
                        <option value="USER">USER</option>
                        <option value="ADMIN">ADMIN</option>
                    </select>
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('role')}" th:errors="*{role}"></div>
                </div>
                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-success">Salvar usuário</button>
                    <a href="/usuarios" class="btn btn-outline-secondary">Cancelar</a>
                </div>
            </form>

            <!-- Alerta de erro -->
            <div th:if="${erro}" class="alert-erro">
                ⚠ <span th:text="${erro}"></span>
            </div>
        </div>
    </div>
</div>
</body>
</html>
