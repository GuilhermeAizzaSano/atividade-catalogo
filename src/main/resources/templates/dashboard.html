<!DOCTYPE html>
<html lang="pt-br"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<nav class="navbar mb-0">
    <div class="container" style="padding-top:0;padding-bottom:0;">
        <div class="d-flex align-items-center">
            <a class="navbar-brand" href="/dashboard">Catalogo</a>
            <div class="nav-links d-flex">
                <a href="/dashboard" class="nav-link-custom">Dashboard</a>
                <a href="/produtos" class="nav-link-custom">Produtos</a>
                <a href="/categorias" class="nav-link-custom" sec:authorize="isAuthenticated()">Categorias</a>
                <a href="/usuarios" class="nav-link-custom" sec:authorize="hasRole('ADMIN')">Usuarios</a>
            </div>
        </div>
        <div sec:authorize="isAuthenticated()" class="d-flex align-items-center gap-3">
            <span class="user-welcome">
                Bem-vindo, <strong sec:authentication="name"></strong>
            </span>
            <form th:action="@{/logout}" method="post" class="d-inline">
                <button type="submit" class="btn btn-outline-secondary btn-sm">Sair</button>
            </form>
        </div>
    </div>
</nav>

<div class="container">
    <div class="card">
        <div class="card-header">
            <h2>Painel de Controle</h2>
        </div>
        <div class="card-body p-4">
            <div class="row g-3">
                <div class="col-12 col-md-4">
                    <div class="card p-3 dashboard-kpi">
                        <small class="form-label dashboard-kpi-label">Produtos</small>
                        <h3 class="dashboard-kpi-value" th:text="${totalProdutos}">0</h3>
                    </div>
                </div>
                <div class="col-12 col-md-4">
                    <div class="card p-3 dashboard-kpi">
                        <small class="form-label dashboard-kpi-label">Categorias</small>
                        <h3 class="dashboard-kpi-value" th:text="${totalCategorias}">0</h3>
                    </div>
                </div>
                <div class="col-12 col-md-4" sec:authorize="hasRole('ADMIN')">
                    <div class="card p-3 dashboard-kpi">
                        <small class="form-label dashboard-kpi-label">Usuarios</small>
                        <h3 class="dashboard-kpi-value" th:text="${totalUsuarios}">0</h3>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
