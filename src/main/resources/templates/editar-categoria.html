<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Categoria</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<nav class="navbar mb-0">
    <div class="container" style="padding-top:0;padding-bottom:0;">
        <a class="navbar-brand" href="/categorias">Cat&aacute;logo</a>
    </div>
</nav>

<div class="container">
    <div class="card mx-auto" style="max-width:480px;">
        <div class="card-header">
            <h2>Editar Categoria</h2>
        </div>
        <div class="card-body">
            <form th:action="@{/categorias/editar/{id}(id=${categoria.idCategoria})}"
                  th:object="${categoria}" method="post" novalidate>
                <div class="mb-4">
                    <label class="form-label">Nome da categoria</label>
                    <input type="text" th:field="*{nome}"
                           th:classappend="${#fields.hasErrors('nome')} ? 'is-invalid' : ''"
                           class="form-control" placeholder="Ex.: Eletr&ocirc;nicos">
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('nome')}" th:errors="*{nome}"></div>
                </div>
                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-success">Salvar altera&ccedil;&otilde;es</button>
                    <a href="/categorias" class="btn btn-outline-secondary">Cancelar</a>
                </div>
            </form>
            <div th:if="${erro}" class="alert-erro">
                <span th:text="${erro}"></span>
            </div>
        </div>
    </div>
</div>
</body>
</html>
