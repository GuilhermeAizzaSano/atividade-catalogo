<!DOCTYPE html>
<html lang="pt-br"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Usuarios</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<nav class="navbar mb-0">
    <div class="container" style="padding-top:0;padding-bottom:0;">
        <div class="d-flex align-items-center">
            <a class="navbar-brand" href="/dashboard">Catalogo</a>
            <div class="nav-links d-flex">
                <a href="/dashboard" class="nav-link-custom">Dashboard</a>
                <a href="/produtos" class="nav-link-custom">Produtos</a>
                <a href="/categorias" class="nav-link-custom" sec:authorize="hasRole('ADMIN')">Categorias</a>
                <a href="/usuarios" class="nav-link-custom" sec:authorize="hasRole('ADMIN')">Usuarios</a>
            </div>
        </div>

        <div sec:authorize="isAuthenticated()" class="d-flex align-items-center gap-3">
            <span class="user-welcome">
                Bem-vindo, <strong sec:authentication="name"></strong>
            </span>
            <form th:action="@{/logout}" method="post" class="d-inline">
                <button type="submit" class="btn btn-outline-secondary btn-sm">Sair</button>
            </form>
        </div>
    </div>
</nav>

<div class="container">
    <div class="card">
        <div class="card-header d-flex justify-content-between align-items-center">
            <h2 class="mb-0">Usuarios</h2>
            <div class="d-flex gap-2 align-items-center">
                <form th:action="@{/usuarios}" method="get" class="d-flex gap-2">
                    <input type="text" name="username" th:value="${termoBusca}" class="form-control form-control-sm"
                           placeholder="Buscar por usuario..." style="width: 220px;">
                    <button type="submit" class="btn btn-primary btn-sm">Buscar</button>
                    <a th:if="${termoBusca != null and !termoBusca.isEmpty()}" href="/usuarios"
                       class="btn btn-secondary btn-sm">Limpar</a>
                </form>

                <div sec:authorize="hasRole('ADMIN')">
                    <a href="/usuarios/novo" class="btn btn-success btn-sm">+ Novo</a>
                </div>
            </div>
        </div>

        <div class="card-body" style="padding: 0;">
            <div class="table-responsive">
                <table class="table align-middle">
                    <thead>
                    <tr>
                        <th style="padding-left:28px;">Usuario</th>
                        <th>Perfil</th>
                        <th>Cadastrado em</th>
                        <th sec:authorize="hasRole('ADMIN')">Acoes</th>
                    </tr>
                    </thead>
                    <tbody>

                    <tr th:if="${#lists.isEmpty(usuarios)}">
                        <td colspan="4" style="border:none;">
                            <div class="empty-state">
                                <p>Nenhum usuario cadastrado ainda.</p>
                            </div>
                        </td>
                    </tr>

                    <tr th:each="u : ${usuarios}">
                        <td style="padding-left:28px;" data-label="Usuario">
                            <span class="product-name" th:text="${u.username}"></span>
                        </td>
                        <td data-label="Perfil">
                            <span th:text="${u.role}"
                                  th:classappend="${u.role == 'ADMIN'} ? 'badge bg-danger' : 'badge bg-secondary'"></span>
                        </td>
                        <td data-label="Cadastrado em"
                            th:text="${#temporals.format(u.dataCadastro, 'dd/MM/yyyy HH:mm')}"></td>

                        <td data-label="Acoes" sec:authorize="hasRole('ADMIN')">
                            <div class="action-group">
                                <a th:href="@{/usuarios/editar/{id}(id=${u.idUsuario})}" class="btn btn-success btn-sm">Editar</a>
                                <button type="button" class="btn btn-danger btn-sm" data-bs-toggle="modal"
                                        data-bs-target="#modalExcluir"
                                        th:attr="data-id=${u.idUsuario}, data-nome=${u.username}">
                                    Excluir
                                </button>
                            </div>
                        </td>
                    </tr>

                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="modalExcluir" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Excluir usuario</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                Voce esta prestes a excluir o usuario <strong id="nomeUsuario"></strong>. Essa acao nao pode ser desfeita.
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                <a id="btnConfirmarExclusao" href="#" class="btn btn-danger">Confirmar exclusao</a>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    document.getElementById('modalExcluir').addEventListener('show.bs.modal', function(e) {
        const btn = e.relatedTarget;
        document.getElementById('nomeUsuario').textContent = btn.getAttribute('data-nome');
        document.getElementById('btnConfirmarExclusao').href = '/usuarios/excluir/' + btn.getAttribute('data-id');
    });
</script>
</body>
</html>
